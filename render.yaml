# Render Blueprint — one-click backend deploy.
# Dashboard alternative: see docs/deployment.md for click-by-click steps.
#
# In Render: New + → Blueprint → connect this repo. Render reads this file.
# Then set the three secret env vars (marked sync:false) in the dashboard.

services:
  - type: web
    name: doc-intelligence-api
    runtime: python
    rootDir: backend
    plan: free
    # CPU-only torch keeps the build small enough for the free tier; then the
    # rest of the deps; then train the NER model so the API serves the hybrid
    # tagger (PERSON/ORG/LOCATION). Drop the last command to ship rules-only.
    buildCommand: >-
      pip install torch --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r requirements.txt &&
      python -m scripts.train_ner
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Comma-separated allowed frontend origins (your Vercel URL). REQUIRED so
      # the browser can call the API. e.g. https://your-app.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Signs session tokens — REQUIRED in production. Generate a random value
      # (e.g. `openssl rand -hex 32`) and set it here. Render can also
      # auto-generate one for you with generateValue: true.
      - key: AUTH_SECRET
        generateValue: true
      # Optional — enables Groq llama-3.3-70b-versatile answers/summaries.
      - key: GROQ_API_KEY
        sync: false
      # Optional — PostgreSQL + pgvector (e.g. your Neon URL) for persistent search.
      - key: DATABASE_URL
        sync: false
